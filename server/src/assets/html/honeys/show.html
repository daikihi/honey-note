<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoneyNote | 蜂蜜の詳細</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/honey_note/css/common_form.css">
</head>
<body>

<header>
    <nav>
        <a class="logo" href="/honey_note/index.html">
            <img src="/honey_note/icons/honeu_note_logo_v0.0.1.jpeg" alt="HoneyNote Logo">
            HoneyNote
        </a>
    </nav>
</header>

<main>
    <script type="module">
      import init, { honey_show_main } from '/honey_note/javascript/front.js';
      init().then(() => {
        honey_show_main();
        console.log('WASM loaded on show.html!');
      });
    </script>
    <h1 id="honey_title">蜂蜜の詳細</h1>

    <!-- 基本情報 -->
    <div class="section">
        <h2>基本情報</h2>
        <div class="info-grid">
            <div class="label">名称</div>
            <div id="field_name_jp">-</div>

            <div class="label">養蜂場</div>
            <div id="field_beekeeper">-</div>

            <div class="label">採蜜年</div>
            <div id="field_harvest_year">-</div>

            <div class="label">原産国</div>
            <div id="field_country">-</div>

            <div class="label">原産地域</div>
            <div id="field_region">-</div>

            <div class="label">蜜源植物</div>
            <div class="tag-list" id="field_flowers"></div>

            <div class="label">単花／百花</div>
            <div>単花蜜</div>

            <div class="label">容量</div>
            <div>300g</div>

            <div class="label">購入日</div>
            <div id="field_purchase_date">-</div>

            <div class="label">登録日時</div>
            <div>2024-05-13 10:22</div>

            <div class="label">更新日時</div>
            <div>2024-06-01 09:15</div>
        </div>
    </div>

    <!-- 動的情報（風味・バッチ）表示用コンテナ -->
    <div id="dynamic_info_container"></div>

    <!-- メモ -->
    <div class="section">
        <h2>メモ</h2>
        <p>
            非常に扱いやすい蜂蜜。品質が安定しており、
            来客用にも安心して出せる。
        </p>
        <div class="hint">
            ※ edit 時は textarea
        </div>
    </div>

    <div class="actions">
        <a class="btn-back" href="/honey_note/honeys/lists.html">一覧に戻る</a>
        <a class="btn-edit" id="btn_edit_link" href="/honey_note/honeys/edit.html">編集する</a>
    </div>

</main>
<script>
  // 現在の詳細ページのURLクエリから id を取り出し、編集リンクに継承する
  (function(){
    try {
      const url = new URL(window.location.href);
      const id = url.searchParams.get('id');
      if (id) {
        const a = document.getElementById('btn_edit_link');
        if (a) {
          a.href = `/honey_note/honeys/edit.html?id=${encodeURIComponent(id)}`;
        }
      }
    } catch (e) {
      console.error('failed to setup edit link', e);
    }
  })();
</script>
</body>
</html>
