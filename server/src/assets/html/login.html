<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoneyNote | ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/honey_note/css/common_form.css">
</head>
<body>

<header>
    <nav>
        <a class="logo" href="/honey_note/index.html">
            <img src="/honey_note/icons/honeu_note_logo_v0.0.1.jpeg" alt="HoneyNote Logo">
            HoneyNote
        </a>
    </nav>
</header>

<main>
    <div class="login-container">
        <h1>ログイン</h1>
        <div id="error_message" class="error-message" role="alert" aria-live="assertive" aria-atomic="true"></div>
        <form id="login_form" method="post">
            <div class="form-group">
                <label for="username">ユーザー名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn-login" id="btn_login">ログイン</button>
        </form>
        <div class="signup-link">
            アカウントをお持ちでない方は <a href="/honey_note/signup.html">新規登録</a>
        </div>
    </div>

    <script type="module">
        import init, { login_main } from '/honey_note/javascript/front.js';
        init().then(() => {
            login_main();
        });
    </script>
</main>

</body>
</html>
