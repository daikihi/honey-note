<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoneyNote | 蜜源の新規登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/honey_note/css/common_form.css">

    <script type="module">
        import init, { flower_edit_and_new_main } from '/honey_note/javascript/front.js';
        init().then(() => {
            flower_edit_and_new_main();
            console.log("WASM loaded on flower new.html!");
        });
    </script>
</head>
<body>

<header>
    <nav>
        <div class="nav-left">
            <a class="logo" href="/honey_note/index.html">
                <img src="/honey_note/icons/honeu_note_logo_v0.0.1.jpeg" alt="HoneyNote Logo">
                HoneyNote
            </a>
        </div>
        <div class="nav-links">
            <a href="/honey_note/honeys/lists.html">はちみつ一覧</a>
            <a href="/honey_note/flowers/lists.html">蜜源リスト</a>
            <a href="/honey_note/beekeepers/lists.html">養蜂場</a>
        </div>
    </nav>
</header>

<main>
    <h1 id="page_title">蜜源の新規登録</h1>
    <form id="flower_form">
        <div class="section">
            <h2>基本情報</h2>
            <div class="info-grid">
                <div class="label">蜜源名 (和名) <span class="required">*</span></div>
                <div><input type="text" name="name_jp" id="name_jp" required placeholder="例：アカシア"></div>

                <div class="label">蜜源名 (英名)</div>
                <div><input type="text" name="name_en" id="name_en" placeholder="例：Acacia"></div>

                <div class="label">学名</div>
                <div><input type="text" name="scientific_name" id="scientific_name"></div>

                <div class="label">短い説明</div>
                <div><input type="text" name="short_note" id="short_note"></div>

                <div class="label">種類</div>
                <div><input type="text" name="flower_type" id="flower_type" placeholder="例：木本"></div>

                <div class="label">備考</div>
                <div><textarea name="note" id="note"></textarea></div>
            </div>
        </div>

        <div class="actions">
            <a class="btn-cancel" href="/honey_note/flowers/lists.html">キャンセル</a>
            <button class="btn-save" type="button" id="btn_save">保存</button>
        </div>
    </form>
</main>
</body>
</html>
