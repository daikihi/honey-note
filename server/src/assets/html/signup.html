<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>HoneyNote | 新規登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/honey_note/css/common_form.css">
</head>
<body>

<header>
    <nav>
        <a class="logo" href="/honey_note/index.html">
            <img src="/honey_note/icons/honeu_note_logo_v0.0.1.jpeg" alt="HoneyNote Logo">
            HoneyNote
        </a>
    </nav>
</header>

<main>
    <div class="signup-container">
        <h1>新規登録</h1>
        <div id="error_message" class="error-message"></div>
        <form id="signup_form">
            <div class="form-group">
                <label for="username">ユーザー名</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">パスワード</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">パスワード（確認）</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn-signup" id="btn_signup">新規登録</button>
        </form>
        <div class="login-link">
            すでにアカウントをお持ちの方は <a href="/honey_note/login.html">ログイン</a>
        </div>
    </div>

    <script type="module">
        import init, { signup_main } from '/honey_note/javascript/front.js';
        init().then(() => {
            signup_main();
        });
    </script>
</main>

</body>
</html>
